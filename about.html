      <p class="about-story-card__text">我们做 DreamLens，是因为我们相信，梦不只是醒来后很快消散的片段，它常常藏着情绪、记忆和那些还没有被说出口的内心线索。我们想做一个安静而细腻的地方，帮助人们把梦记录下来、慢慢读懂，再用图像和文字把它留下。DreamLens 不是为了给梦下一个绝对答案，而是想陪你更认真地看见自己。</p>
