<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>梦境日记 · DreamLens</title>
<link rel="stylesheet" href="css/dreamscape.css">
<link rel="stylesheet" href="css/diary.css">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;600;700;900&family=Noto+Sans+SC:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
</head>
<body class="ds-page-enter ds-shell ds-shell--diary">

<div class="ds-bg"></div>
<div class="ds-stars" id="dsStars"></div>
<div class="ds-mist"  id="dsMist"></div>

<!-- ── Nav ── -->
<nav class="ds-nav ds-nav--scrolled" id="dsNav">
  <div class="ds-nav__inner">
    <a href="index.html" class="ds-nav__logo">
      <span class="ds-nav__logo-icon" aria-hidden="true"></span>
      <span class="ds-nav__logo-text">DreamLens</span>
      <span class="ds-nav__logo-sub">梦境日记</span>
    </a>
    <ul class="ds-nav__links" id="navLinks">
      <li><a href="index.html"   class="ds-nav__link">首页</a></li>
      <li><a href="analyze.html" class="ds-nav__link">梦境解析</a></li>
      <li><a href="diary.html"   class="ds-nav__link ds-nav__link--active">梦境日记</a></li>
      <li><a href="community.html" class="ds-nav__link">梦境广场</a></li>
    </ul>
    <button class="ds-nav__toggle" id="navToggle"><i class="fas fa-bars"></i></button>
  </div>
</nav>

<section class="ds-subpage-shell">
  <div class="ds-subpage-shell__rings" aria-hidden="true">
    <span class="ds-subpage-shell__ring ds-subpage-shell__ring--1"></span>
    <span class="ds-subpage-shell__ring ds-subpage-shell__ring--2"></span>
    <span class="ds-subpage-shell__ring ds-subpage-shell__ring--3"></span>
  </div>

<!-- ── Page Header ── -->
<div class="dy-hero ds-page-hero ds-z1">
  <div class="dy-hero__main">
    <div class="dy-hero__copy">
      <div class="dy-hero__eyebrow">我的梦境日记</div>
      <h1 class="dy-hero__title">记录每一个梦</h1>
      <p class="dy-hero__sub">那些被记住的梦，会在这里慢慢留下形状。</p>
    </div>

    <div class="dy-hero__echo" aria-label="最近梦境回声">
      <div class="dy-hero__echo-track">
        <div class="dy-mood-track dy-mood-track--hero" id="dyMoodTrack" aria-label="最近梦境情绪轨迹"></div>
      </div>
    </div>
  </div>

  <div class="dy-hero__actions">
    <div class="dy-hero__search-shell">
      <div class="dy-search dy-search--hero">
        <i class="fas fa-search dy-search__icon"></i>
        <input type="text" id="dySearchInput" class="dy-search__input" placeholder="搜索梦题、内容或图腾">
        <button class="dy-search__clear" id="dySearchClear" style="display:none" onclick="clearSearch()">
          <i class="fas fa-times"></i>
        </button>
      </div>
    </div>

    <div class="dy-hero__meta-row">
      <span class="dy-hero__count" id="dyDreamCount">已收留 0 个梦</span>
      <button class="ds-btn ds-btn-primary ds-btn-sm dy-hero__record" onclick="openWriteModal()">
        <i class="fas fa-pen"></i> 手动记录
      </button>
    </div>
  </div>
</div>

<!-- ══════════════════════════════
     MAIN CONTAINER
════════════════════════════════ -->
<div class="dy-container ds-z1">
  <section class="dy-track ds-card">
    <div class="dy-track__stage">
      <div class="dy-track__surface">
        <div class="dy-section-head">
          <div class="dy-section-head__copy">
            <h2>梦境图腾</h2>
            <p>每一次记录都会留下一个主意向符号，它们会在时间里慢慢组成你的梦境轨迹。</p>
          </div>
        </div>

        <div class="dy-track__toolbar">
          <div class="dy-track__month" id="dyTrackMeta">2026 年 3 月</div>
          <div class="dy-track__controls">
            <button type="button" class="dy-track__nav" id="dyTrackPrev" aria-label="查看上一个月">
              <i class="fas fa-chevron-left"></i>
            </button>
            <div class="dy-track__selects">
              <label class="dy-track__select-wrap">
                <select class="dy-track__select" id="dyTrackYear" aria-label="选择年份"></select>
              </label>
              <label class="dy-track__select-wrap">
                <select class="dy-track__select" id="dyTrackMonth" aria-label="选择月份"></select>
              </label>
            </div>
            <button type="button" class="dy-track__nav" id="dyTrackNext" aria-label="查看下一个月">
              <i class="fas fa-chevron-right"></i>
            </button>
          </div>
        </div>

        <div class="dy-track__panel">
          <div class="dy-track__calendar">
            <div class="dy-track__weekdays" aria-hidden="true">
              <span>周一</span>
              <span>周二</span>
              <span>周三</span>
              <span>周四</span>
              <span>周五</span>
              <span>周六</span>
              <span>周日</span>
            </div>
            <div class="dy-track__grid" id="dyTotemGrid"></div>
          </div>
        </div>

        <div class="dy-track__summary" id="dyTotemLegend"></div>
      </div>
    </div>
  </section>

</div><!-- /dy-container -->

<!-- ══════════════════════════════
     手动写入弹窗
════════════════════════════════ -->
<div class="dy-modal-overlay" id="writeModal" style="display:none" onclick="closeWriteModal(event)">
  <div class="dy-modal ds-panel" onclick="event.stopPropagation()">
    <div class="dy-modal__header">
      <h3 class="dy-modal__title"><i class="fas fa-moon"></i> 记录梦境</h3>
      <button class="dy-modal__close" onclick="closeWriteModal()"><i class="fas fa-times"></i></button>
    </div>
    <div class="dy-modal__body">
      <div class="dy-form-group">
        <label class="dy-label">梦境标题 <span class="dy-label__opt">（选填）</span></label>
        <input type="text" id="writeTitle" class="dy-input" placeholder="给这个梦起个名字...">
      </div>
      <div class="dy-form-group">
        <label class="dy-label">梦境内容 <span class="dy-label__req">*</span></label>
        <textarea id="writeContent" class="dy-textarea" placeholder="详细描述你的梦境，包括场景、人物、情绪……" maxlength="2000"></textarea>
        <div class="dy-char-count"><span id="writeCharCount">0</span> / 2000</div>
      </div>
      <div class="dy-form-group">
        <label class="dy-label">醒来时的感受</label>
        <div class="dy-emotion-pick" id="writeEmotionPick">
          <button class="dy-emo-btn" data-emotion="安宁"  onclick="pickEmotion(this)">安宁</button>
          <button class="dy-emo-btn" data-emotion="焦虑"  onclick="pickEmotion(this)">焦虑</button>
          <button class="dy-emo-btn" data-emotion="兴奋"  onclick="pickEmotion(this)">兴奋</button>
          <button class="dy-emo-btn" data-emotion="悲伤"  onclick="pickEmotion(this)">悲伤</button>
          <button class="dy-emo-btn" data-emotion="困惑"  onclick="pickEmotion(this)">困惑</button>
          <button class="dy-emo-btn" data-emotion="恐惧"  onclick="pickEmotion(this)">恐惧</button>
          <button class="dy-emo-btn" data-emotion="释然"  onclick="pickEmotion(this)">释然</button>
          <button class="dy-emo-btn" data-emotion="疲惫"  onclick="pickEmotion(this)">疲惫</button>
        </div>
      </div>
      <div class="dy-form-group">
        <label class="dy-label">记录日期</label>
        <input type="date" id="writeDate" class="dy-input">
      </div>
    </div>
    <div class="dy-modal__footer">
      <button class="ds-btn ds-btn-ghost" onclick="closeWriteModal()">取消</button>
      <button class="ds-btn ds-btn-primary" onclick="saveManualEntry()">
        <i class="fas fa-save"></i> 保存记录
      </button>
    </div>
  </div>
</div>

<!-- ══════════════════════════════
     详情弹窗
════════════════════════════════ -->
<div class="dy-modal-overlay" id="detailModal" style="display:none" onclick="closeDetailModal(event)">
  <div class="dy-modal dy-modal--detail ds-panel" onclick="event.stopPropagation()">
    <div class="dy-modal__header">
      <div>
        <h3 class="dy-modal__title" id="detailTitle">梦境详情</h3>
        <div class="dy-modal__meta" id="detailMeta"></div>
      </div>
      <button class="dy-modal__close" onclick="closeDetailModal()"><i class="fas fa-times"></i></button>
    </div>
    <div class="dy-modal__body" id="detailBody">
      <!-- 动态填充 -->
    </div>
    <div class="dy-modal__footer">
      <button class="ds-btn ds-btn-ghost ds-btn-sm" id="detailEditBtn" onclick="editEntry(currentDetailId)">
        <i class="fas fa-edit"></i> 编辑
      </button>
      <button class="ds-btn ds-btn-ghost ds-btn-sm dy-btn--danger" id="detailDeleteBtn" onclick="deleteEntry(currentDetailId)">
        <i class="fas fa-trash"></i> 删除
      </button>
      <button class="ds-btn ds-btn-primary ds-btn-sm" id="detailReanalyzeBtn" onclick="reanalyze(currentDetailId)">
        <i class="fas fa-magic"></i> 重新解析
      </button>
    </div>
  </div>
</div>

<!-- ── 确认清空弹窗 ── -->
<div class="dy-modal-overlay" id="clearModal" style="display:none" onclick="document.getElementById('clearModal').style.display='none'">
  <div class="dy-modal dy-modal--sm ds-panel" onclick="event.stopPropagation()">
    <div class="dy-modal__header">
      <h3 class="dy-modal__title">⚠️ 确认清空</h3>
      <button class="dy-modal__close" onclick="document.getElementById('clearModal').style.display='none'"><i class="fas fa-times"></i></button>
    </div>
    <div class="dy-modal__body">
      <p style="color:var(--ds-t3);line-height:1.8">确定要清空所有梦境日记吗？此操作不可恢复。</p>
    </div>
    <div class="dy-modal__footer">
      <button class="ds-btn ds-btn-ghost" onclick="document.getElementById('clearModal').style.display='none'">取消</button>
      <button class="ds-btn dy-btn--danger-solid" onclick="clearAllDreams()">确认清空</button>
    </div>
  </div>
</div>

<div class="ds-toast" id="toast"></div>

</section>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="js/main.js"></script>
<script src="js/diary.js"></script>
</body>
</html>
